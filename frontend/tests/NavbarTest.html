<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NavbarTest - Xestify Frontend</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
<h2>NavbarTest</h2>
<div id="sandbox" style="display:none"></div>
<pre id="output"></pre>

<script type="module">
  import { Navbar } from '../src/js/modules/Navbar.js';

  let passed = 0;
  let failed = 0;
  const out = document.getElementById('output');

  function log(line) {
    out.textContent += line + '\n';
  }

  function assertTrue(value, msg = 'assertTrue failed') {
    if (!value) {
      throw new Error(msg);
    }
  }

  function assertEquals(a, b, msg) {
    if (a !== b) {
      throw new Error(msg ?? `Expected "${String(b)}" but got "${String(a)}"`);
    }
  }

  function it(name, fn) {
    const container = document.createElement('div');
    document.getElementById('sandbox').appendChild(container);
    try {
      fn(container);
      log(`✅ ${name}`);
      passed++;
    } catch (err) {
      log(`❌ ${name}: ${err.message}`);
      failed++;
    }
    container.remove();
  }

  function separator() {
    log('────────────────────────────────────────────────────────────────────────');
  }

  function finishTestRunner() {
    const cls = failed === 0 ? 'pass' : 'fail';
    log(`Resultado: ${passed} passed, ${failed} failed`);

    out.innerHTML = out.textContent
      .replaceAll('✅', '<span class="pass">✅</span>')
      .replaceAll('❌', '<span class="fail">❌</span>')
      .replace(/Resultado:.*/, (m) => `<span class="${cls}">${m}</span>`);
  }

  const ENTITIES = [
    { slug: 'client', label: 'Clientes' },
    { slug: 'product', label: 'Productos' },
  ];

  // ── Tests ──────────────────────────────────────────────────────────────────

  it('throws TypeError when container selector does not match', (_container) => {
    let threw = false;
    try {
      new Navbar('#non-existent-element-xyz');
    } catch (err) {
      threw = err instanceof TypeError;
    }
    assertTrue(threw, 'Expected TypeError for missing container');
  });

  it('renders nav element with brand text', (container) => {
    const navbar = new Navbar(container);
    assertTrue(navbar instanceof Navbar, 'Navbar instance should be created');
    const nav = container.querySelector('.xt-navbar');
    assertTrue(nav !== null, 'Expected .xt-navbar element');
    const brand = container.querySelector('.xt-navbar__brand');
    assertTrue(brand !== null, 'Expected .xt-navbar__brand');
    assertEquals(brand.textContent, 'Xestify', 'Brand text should be Xestify');
  });

  it('renders one nav link per entity and Plugins', (container) => {
    const navbar = new Navbar(container, { entities: ENTITIES, canManagePlugins: true });
    assertTrue(navbar instanceof Navbar, 'Navbar instance should be created');
    const links = container.querySelectorAll('.xt-navbar__link');
    assertEquals(links.length, 3, 'Expected 3 nav links');
    const pages = new Set(Array.from(links).map((l) => l.dataset.page));
    assertTrue(pages.has('entity:client'), 'Missing client entity link');
    assertTrue(pages.has('entity:product'), 'Missing product entity link');
    assertTrue(pages.has('plugins'), 'Missing plugins link');
  });

  it('shows user email when provided', (container) => {
    const navbar = new Navbar(container, { userEmail: 'admin@xestify.local' });
    assertTrue(navbar instanceof Navbar, 'Navbar instance should be created');
    const userEl = container.querySelector('.xt-navbar__user');
    assertTrue(userEl !== null, 'Expected .xt-navbar__user element');
    assertEquals(userEl.textContent, 'admin@xestify.local', 'User email not shown');
    assertTrue(!userEl.hidden, 'User element should not be hidden');
  });

  it('hides user element when no email provided', (container) => {
    const navbar = new Navbar(container);
    assertTrue(navbar instanceof Navbar, 'Navbar instance should be created');
    const userEl = container.querySelector('.xt-navbar__user');
    assertTrue(userEl !== null, 'Expected .xt-navbar__user element');
    assertTrue(userEl.hidden, 'User element should be hidden when no email');
  });

  it('calls onLogout when logout button is clicked', (container) => {
    let called = false;
    const navbar = new Navbar(container, { onLogout: () => { called = true; } });
    assertTrue(navbar instanceof Navbar, 'Navbar instance should be created');
    const logoutBtn = container.querySelector('.xt-navbar__logout');
    assertTrue(logoutBtn !== null, 'Expected logout button');
    logoutBtn.click();
    assertTrue(called, 'onLogout was not called');
  });

  it('calls onNavigate with correct page when link is clicked', (container) => {
    let navigatedTo = null;
    const navbar = new Navbar(container, { entities: ENTITIES, canManagePlugins: true, onNavigate: (page) => { navigatedTo = page; } });
    assertTrue(navbar instanceof Navbar, 'Navbar instance should be created');

    const clientLink = container.querySelector('[data-page="entity:client"]');
    assertTrue(clientLink !== null, 'Expected client entity link');
    clientLink.click();
    assertEquals(navigatedTo, 'entity:client', 'onNavigate should receive "entity:client"');

    const pluginsLink = container.querySelector('[data-page="plugins"]');
    pluginsLink.click();
    assertEquals(navigatedTo, 'plugins', 'onNavigate should receive "plugins"');
  });

  it('marks clicked link as active', (container) => {
    const navbar = new Navbar(container, { entities: ENTITIES, canManagePlugins: true, onNavigate: () => { return; } });
    assertTrue(navbar instanceof Navbar, 'Navbar instance should be created');
    const clientLink = container.querySelector('[data-page="entity:client"]');
    clientLink.click();
    assertTrue(clientLink.classList.contains('xt-navbar__link--active'), 'Client link should be active');
    assertEquals(clientLink.getAttribute('aria-current'), 'page', 'aria-current should be "page"');

    const pluginsLink = container.querySelector('[data-page="plugins"]');
    pluginsLink.click();
    assertTrue(pluginsLink.classList.contains('xt-navbar__link--active'), 'Plugins link should be active');
    assertTrue(!clientLink.classList.contains('xt-navbar__link--active'), 'Client link should not be active after plugins clicked');
  });

  it('setUserEmail updates displayed email', (container) => {
    const navbar = new Navbar(container, { userEmail: 'foo@bar.com' });
    navbar.setUserEmail('new@user.com');
    const userEl = container.querySelector('.xt-navbar__user');
    assertEquals(userEl.textContent, 'new@user.com', 'Email not updated');
    assertTrue(!userEl.hidden, 'User element should not be hidden after email set');
  });

  it('setUserEmail with null hides user element', (container) => {
    const navbar = new Navbar(container, { userEmail: 'foo@bar.com' });
    navbar.setUserEmail(null);
    const userEl = container.querySelector('.xt-navbar__user');
    assertTrue(userEl.hidden, 'User element should be hidden after null email');
  });

  // ── Summary ────────────────────────────────────────────────────────────────

  separator();
  finishTestRunner();
</script>
</body>
</html>
