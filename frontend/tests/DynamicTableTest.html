<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DynamicTableTest - Xestify Frontend</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
<h2>DynamicTableTest</h2>
<div id="sandbox" style="display:none"></div>
<pre id="output"></pre>

<script type="module">
  import { DynamicTable } from '../src/js/modules/DynamicTable.js';
  import { initTestRunner, log, assertEquals, assertTrue } from './js/helpers.js';

  initTestRunner('output');

  const sandbox = document.getElementById('sandbox');

  // Local counters for custom test() function below
  let passed = 0;
  let failed = 0;

  function createSchema() {
    return {
      fields: [
        { name: 'id', label: 'ID' },
        { name: 'title', label: 'Title' },
        { name: 'status', label: 'Status' }
      ]
    };
  }

  function createRecords(total = 5) {
    const records = [];
    for (let i = 1; i <= total; i++) {
      records.push({ id: i, title: `Record ${i}`, status: i % 2 === 0 ? 'done' : 'open' });
    }
    return records;
  }

  async function test(name, fn) {
    try {
      sandbox.innerHTML = '<div id="table-container"></div>';
      await fn();
      log(`  ✅ ${name}`);
      passed++;
    } catch (e) {
      log(`  ❌ ${name}`);
      log(`     ${e.message}`);
      failed++;
    }
  }

  function separator() {
    log('────────────────────────────────────────────────────────────────────────');
  }

  function finishLocalSummary() {
    separator();
    const cls = failed === 0 ? 'pass' : 'fail';
    log(`Resultado: ${passed} passed, ${failed} failed`);

    document.getElementById('output').innerHTML = document.getElementById('output').textContent
      .replaceAll('✅', '<span class="pass">✅</span>')
      .replaceAll('❌', '<span class="fail">❌</span>')
      .replace(/Resultado:.*/, (m) => `<span class="${cls}">${m}</span>`);
  }

  separator();

  await test('render() shows dynamic columns from schema', async () => {
    const table = new DynamicTable(createRecords(2), createSchema(), '#table-container');
    table.render();

    const headers = Array.from(sandbox.querySelectorAll('th')).map((th) => th.textContent);
    assertEquals(headers, ['ID', 'Title', 'Status']);
  });

  await test('render() shows rows for current page', async () => {
    const table = new DynamicTable(createRecords(3), createSchema(), '#table-container', { pageSize: 10 });
    table.render();

    const rows = sandbox.querySelectorAll('tbody tr');
    assertEquals(rows.length, 3);
  });

  await test('basic pagination: nextPage() changes visible records', async () => {
    const table = new DynamicTable(createRecords(5), createSchema(), '#table-container', { pageSize: 2 });
    table.render();

    let firstRow = sandbox.querySelector('tbody tr td');
    assertTrue(firstRow !== null, 'first row should exist on page 1');
    assertEquals(firstRow.textContent, '1');

    table.nextPage();
    table.render();

    firstRow = sandbox.querySelector('tbody tr td');
    assertTrue(firstRow !== null, 'first row should exist on page 2');
    assertEquals(firstRow.textContent, '3');
  });

  await test('pagination bounds: prev on page 1 and next on last page stay in range', async () => {
    const table = new DynamicTable(createRecords(3), createSchema(), '#table-container', { pageSize: 2 });

    table.prevPage();
    assertEquals(table.getCurrentPage(), 1);

    table.nextPage();
    table.nextPage();
    assertEquals(table.getCurrentPage(), 2);
  });

  await test('setRecords() resets to first page', async () => {
    const table = new DynamicTable(createRecords(5), createSchema(), '#table-container', { pageSize: 2 });

    table.nextPage();
    assertEquals(table.getCurrentPage(), 2);

    table.setRecords(createRecords(1));
    assertEquals(table.getCurrentPage(), 1);
    assertEquals(table.getTotalPages(), 1);
  });

  await test('empty records render fallback row', async () => {
    const table = new DynamicTable([], createSchema(), '#table-container');
    table.render();

    const cell = sandbox.querySelector('tbody tr td');
    assertTrue(cell !== null, 'fallback cell should exist');
    assertEquals(cell.textContent, 'No records');
  });

  finishLocalSummary();
</script>
</body>
</html>
