<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>StateTest - Xestify Frontend</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
<h2>StateTest</h2>
<pre id="output"></pre>

<script type="module">
  import { AppState } from '../src/js/modules/State.js';
  import { initTestRunner, separator, test, assertEquals, assertTrue, finishTestRunner } from './js/helpers.js';

  initTestRunner('output');

  separator();

  await test('setUser/getUser stores and returns user', async () => {
    const user = { id: 'u1', email: 'admin@xestify.local' };
    AppState.setUser(user);
    assertEquals(AppState.getUser(), user);
  });

  await test('setUser(null) clears user', async () => {
    AppState.setUser({ id: 'u1' });
    AppState.setUser(null);
    assertTrue(AppState.getUser() === null, 'user must be null');
  });

  await test('setCurrentEntity/getCurrentEntity works', async () => {
    AppState.setCurrentEntity('client');
    assertTrue(AppState.getCurrentEntity() === 'client', 'currentEntity must match');
  });

  await test('setEntities/getEntities stores list', async () => {
    AppState.setEntities([{ slug: 'client' }, { slug: 'invoice' }]);
    assertEquals(AppState.getEntities().length, 2);
  });

  await test('setEntities with non-array resets to []', async () => {
    AppState.setEntities('invalid');
    assertEquals(AppState.getEntities(), []);
  });

  await test('setRecords/getRecords stores list', async () => {
    AppState.setRecords([{ id: 1 }, { id: 2 }]);
    assertEquals(AppState.getRecords().length, 2);
  });

  await test('setMetadata/getMetadata stores object', async () => {
    AppState.setMetadata({ total: 10, page: 1 });
    assertEquals(AppState.getMetadata(), { total: 10, page: 1 });
  });

  await test('setToken/getToken stores token', async () => {
    AppState.setToken('jwt-token');
    assertTrue(AppState.getToken() === 'jwt-token', 'token must match');
  });

  await test('setLoading/isLoading toggles loading flag', async () => {
    AppState.setLoading(true);
    assertTrue(AppState.isLoading() === true, 'loading must be true');
    AppState.setLoading(false);
    assertTrue(AppState.isLoading() === false, 'loading must be false');
  });

  await test('setError/getError stores error object', async () => {
    const error = { code: 422, message: 'Validation failed' };
    AppState.setError(error);
    assertEquals(AppState.getError(), error);
  });

  await test('reset() restores initial state', async () => {
    AppState.setUser({ id: 'u1' });
    AppState.setCurrentEntity('client');
    AppState.setEntities([{ slug: 'client' }]);
    AppState.setRecords([{ id: 1 }]);
    AppState.setMetadata({ total: 1 });
    AppState.setToken('abc');
    AppState.setLoading(true);
    AppState.setError({ message: 'boom' });

    AppState.reset();

    assertTrue(AppState.getUser() === null, 'user must be null');
    assertTrue(AppState.getCurrentEntity() === null, 'currentEntity must be null');
    assertEquals(AppState.getEntities(), []);
    assertEquals(AppState.getRecords(), []);
    assertEquals(AppState.getMetadata(), {});
    assertTrue(AppState.getToken() === null, 'token must be null');
    assertTrue(AppState.isLoading() === false, 'loading must be false');
    assertTrue(AppState.getError() === null, 'error must be null');
  });

  separator();
  finishTestRunner('output');
</script>
</body>
</html>
