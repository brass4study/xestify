<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EntityListTest - Xestify Frontend</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
<h2>EntityListTest</h2>
<div id="sandbox" style="display:none"></div>
<pre id="output"></pre>

<script type="module">
  import { EntityList } from '../src/js/pages/EntityList.js';
  import { AppState } from '../src/js/modules/State.js';
  import { initTestRunner, separator, test, assertEquals, assertTrue, makeSandbox, mockFetchWithMap, finishTestRunner } from './js/helpers.js';

  initTestRunner('output');

  // -------------------------------------------------------------------------
  // Tests
  // -------------------------------------------------------------------------

  separator();

  await test('constructor throws on missing container', async () => {
    let threw = false;
    try {
      new EntityList('#does-not-exist-ever');
    } catch {
      threw = true;
    }
    assertTrue(threw, 'Expected TypeError for missing container');
  });

  await test('init renders entity buttons from api response', async () => {
    const container = makeSandbox();
    mockFetchWithMap({
      '/entities': [
        { slug: 'clients', label: 'Clientes' },
        { slug: 'order', label: 'Pedidos' },
      ],
    });

    const page = new EntityList(container);
    await page.init();

    const entities = AppState.getEntities();
    assertEquals(entities.length, 2, 'Should load 2 entities');
    assertEquals(entities[0].slug, 'clients', 'First entity slug');
    assertEquals(entities[1].slug, 'order', 'Second entity slug');
  });

  await test('init stores entities in AppState', async () => {
    const container = makeSandbox();
    const entities = [{ slug: 'clients', label: 'Clientes' }];
    mockFetchWithMap({ '/entities': entities });

    const page = new EntityList(container);
    await page.init();

    assertEquals(AppState.getEntities(), entities, 'AppState.entities should match');
  });

  await test('init renders empty state when no entities', async () => {
    const container = makeSandbox();
    mockFetchWithMap({ '/entities': [] });

    const page = new EntityList(container);
    await page.init();

    const empty = container.querySelector('.xt-placeholder');
    assertTrue(empty !== null, 'Should render empty paragraph');
  });

  await test('loadEntity renders records section with table', async () => {
    const container = makeSandbox();
    mockFetchWithMap({
      '/entities': [{ slug: 'clients', label: 'Clientes', fields: [{ name: 'name', label: 'Name' }] }],
      '/entities/clients/records': [{ name: 'ACME' }, { name: 'Beta Corp' }],
    });

    const page = new EntityList(container);
    await page.init();
    await page.loadEntity('clients');

    const section = container.querySelector('.xt-records-section');
    assertTrue(section !== null, 'Records section should exist');

    const heading = section.querySelector('.xt-records-section__title');
    assertTrue(heading !== null, 'Should render section heading');
    assertTrue(heading.textContent.includes('Clientes'), 'Heading should contain entity label');

    const table = section.querySelector('table');
    assertTrue(table !== null, 'DynamicTable should render a <table>');
  });

  await test('loadEntity stores records in AppState', async () => {
    const container = makeSandbox();
    mockFetchWithMap({
      '/entities': [{ slug: 'clients', label: 'Clientes', fields: [] }],
      '/entities/clients/records': [
        { id: '1', entity_slug: 'clients', created_at: null, updated_at: null, content: { name: 'ACME' } },
      ],
    });

    const page = new EntityList(container);
    await page.init();
    await page.loadEntity('clients');

    const stored = AppState.getRecords();
    assertEquals(stored.length, 1, 'Should have 1 record');
    assertEquals(stored[0].name, 'ACME', 'Record name should be ACME');
    assertEquals(AppState.getCurrentEntity(), 'clients', 'AppState.currentEntity should be set');
  });

  await test('"Crear nuevo registro" button calls onCreateNew callback', async () => {
    const container = makeSandbox();
    mockFetchWithMap({
      '/entities': [{ slug: 'clients', label: 'Clientes', fields: [] }],
      '/entities/clients/records': [],
    });

    let calledWith = null;
    const onCreateNew = (slug) => { calledWith = slug; };

    const page = new EntityList(container, { onCreateNew });
    await page.init();
    await page.loadEntity('clients');

    const createBtn = container.querySelector('.xt-btn--primary');
    assertTrue(createBtn !== null, '"Crear nuevo registro" button should exist');
    createBtn.click();

    assertEquals(calledWith, 'clients', 'onCreateNew should be called with the entity slug');
  });

  // ------------------------------------------------------------------------
  // Summary
  // ------------------------------------------------------------------------

  finishTestRunner('output');
</script>
</body>
</html>
